name: Build and Release Kindle Dictionary

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      SOURCE_FILE: Data Source.txt
      DICTIONARY_NAME: English-Persian Dictionary
      AUTHOR_NAME: hossein1376
      INPUT_LANGUAGE: en-us
      OUTPUT_LANGUAGE: fa-ir
      CONTENT_SCRIPT_URL: https://raw.githubusercontent.com/hossein1376/Kindle-Custom-Dictionary-Scripts/main/content.py
      OPF_SCRIPT_URL: https://raw.githubusercontent.com/hossein1376/Kindle-Custom-Dictionary-Scripts/main/opf.py

    outputs:
      opf_file: ${{ steps.meta.outputs.opf_file }}
      mobi_exists: ${{ steps.files.outputs.mobi_exists }}
      mobi_file: ${{ steps.files.outputs.mobi_file }}
      dictionary_name: ${{ steps.meta.outputs.dictionary_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set build metadata
        id: meta
        shell: bash
        run: |
          OPF_FILE="${DICTIONARY_NAME}.opf"

          {
            echo "dictionary_name=${DICTIONARY_NAME}"
            echo "author_name=${AUTHOR_NAME}"
            echo "input_language=${INPUT_LANGUAGE}"
            echo "output_language=${OUTPUT_LANGUAGE}"
            echo "opf_file=${OPF_FILE}"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare build workspace
        shell: bash
        run: |
          mkdir -p build
          cp ".src/${SOURCE_FILE}" "build/${SOURCE_FILE}"

      - name: Download generation scripts
        working-directory: build
        shell: bash
        run: |
          curl -fsSL "$CONTENT_SCRIPT_URL" -o content.py
          curl -fsSL "$OPF_SCRIPT_URL" -o opf.py

      - name: Generate HTML files from source
        id: content
        working-directory: build
        shell: bash
        run: |
          printf '%s\n' "$SOURCE_FILE" | python content.py
          COUNT=$(find . -maxdepth 1 -name 'content*.html' | wc -l | tr -d ' ')
          echo "content_count=${COUNT}" >> "$GITHUB_OUTPUT"

      - name: Generate OPF file
        working-directory: build
        shell: bash
        run: |
          PAGE_COUNT=$(find . -maxdepth 1 -name 'content*.html' | wc -l | tr -d ' ')
          {
            printf '%s\n' "$PAGE_COUNT"
            printf '%s\n' '${{ steps.meta.outputs.dictionary_name }}'
            printf '%s\n' '${{ steps.meta.outputs.author_name }}'
            printf '%s\n' '${{ steps.meta.outputs.input_language }}'
            printf '%s\n' '${{ steps.meta.outputs.output_language }}'
          } | python opf.py

      - name: Fix OPF namespaces for strict converters
        working-directory: build
        shell: bash
        run: |
          OPF_FILE='${{ steps.meta.outputs.opf_file }}'
          sed -i 's#<package version="2.0" xmlns="http://www.idpf.org/2007/opf" unique-identifier="BookId">#<package version="2.0" xmlns="http://www.idpf.org/2007/opf" xmlns:dc="http://purl.org/dc/elements/1.1/" xmlns:opf="http://www.idpf.org/2007/opf" unique-identifier="BookId">#' "$OPF_FILE"

      - name: Build MOBI with Docker kindlegen
        working-directory: build
        shell: bash
        run: |
          cp '${{ steps.meta.outputs.opf_file }}' dict.opf
          docker run --rm -v "$PWD:/work" koenrh/kindlegen /work/dict.opf -verbose > kindlegen.log 2>&1
          tail -n 200 kindlegen.log || true

      - name: Collect generated files
        id: files
        working-directory: build
        shell: bash
        run: |
          shopt -s nullglob
          ls -la

          if [[ ! -f '${{ steps.meta.outputs.opf_file }}' ]]; then
            echo "Expected OPF file not found: ${{ steps.meta.outputs.opf_file }}"
            exit 1
          fi

          MOBI_FILE=""
          if compgen -G "*.mobi" > /dev/null; then
            MOBI_FILE=$(ls -S *.mobi | head -n 1)
          fi

          if [[ -n "$MOBI_FILE" ]]; then
            RELEASE_MOBI="English-Persian.Dictionary.${GITHUB_REF_NAME}.mobi"
            if [[ "$MOBI_FILE" != "$RELEASE_MOBI" ]]; then
              mv "$MOBI_FILE" "$RELEASE_MOBI"
            fi

            MOBI_SIZE=$(stat -c%s "$RELEASE_MOBI")
            MIN_VALID_MOBI_SIZE=1048576
            if [[ "$MOBI_SIZE" -lt "$MIN_VALID_MOBI_SIZE" ]]; then
              echo "Generated MOBI is too small (${MOBI_SIZE} bytes)."
              echo "This indicates a failed/invalid conversion output."
              echo "See build/kindlegen.log for details."
              ls -lh *.mobi || true
              exit 1
            fi

            echo "mobi_exists=true" >> "$GITHUB_OUTPUT"
            echo "mobi_file=$RELEASE_MOBI" >> "$GITHUB_OUTPUT"
          else
            echo "MOBI generation failed. Check build/kindlegen.log"
            echo "Generated files in build directory:"
            ls -la
            tail -n 400 kindlegen.log || true
            exit 1
          fi

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kindle-dictionary-build
          path: |
            build/content*.html
            build/${{ steps.meta.outputs.opf_file }}
            build/*.mobi
            build/kindlegen.log
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: kindle-dictionary-build
          path: dist

      - name: Compose release notes
        id: notes
        shell: bash
        run: |
          {
            echo "## Build Output"
            echo "- MOBI generated successfully"
          } > release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/*.mobi
          body_path: release-notes.md
